<!-- 하단 탭바 -->
<nav class="bottom-tab">

  <!-- 홈 -->
  <button class="tab active tap" data-page="homePage">
    <span>🏠</span>
    <small>홈</small>
  </button>

  <!-- 탐색 -->
  <button class="tab tap" data-page="explorePage">
    <span>🔍</span>
    <small>탐색</small>
  </button>

  <!-- MY -->
  <button class="tab tap" data-page="myPage">
    <span>👾</span>
    <small>MY</small>
  </button>

  <!-- 설정 -->
  <button class="tab tap" data-page="settingPage">
    <span>⚙️</span>
    <small>설정</small>
  </button>

</nav>

<!-- JS -->
<script>

  // 탭
  const tabs = document.querySelectorAll(".tab");
  const pages = document.querySelectorAll(".page");

  tabs.forEach(tab => {

    tab.addEventListener("click", () => {

      // 기존 active 제거
      tabs.forEach(t => t.classList.remove("active"));
      pages.forEach(p => p.classList.remove("active"));

      // 현재 탭 active
      tab.classList.add("active");

      // 해당 페이지 열기
      const target = tab.dataset.page;

      document
        .getElementById(target)
        .classList.add("active");

    });

  });

  // 눌림 효과
  document.querySelectorAll('.tap').forEach(btn => {

    btn.addEventListener('click', () => {

      btn.classList.add('selected');

      setTimeout(() => {
        btn.classList.remove('selected');
      }, 150);

    });

  });

</script>
